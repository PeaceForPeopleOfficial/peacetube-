backend:
  name: github
  repo: PeaceForPeopleOFfficial/peacetube-
  branch: main
  site_url: https://peaceforpeopleofficial.netlify.app

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  # ১. শান্তির বাণী বা সাধারণ পোস্টের জন্য ঘর
  - name: "blog"
    label: "শান্তির বাণী (Articles)"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "শিরোনাম (Title)", name: "title", widget: "string"}
      - {label: "তারিখ (Publish Date)", name: "date", widget: "datetime"}
      - {label: "শান্তির বাণী / মূল লেখা (Body)", name: "body", widget: "markdown"}

  # ২. ইউটিউব ভিডিও পোস্ট করার জন্য ঘর
  - name: "videos"
    label: "ভিডিও গ্যালারি (Videos)"
    folder: "_videos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "ভিডিওর শিরোনাম (Title)", name: "title", widget: "string"}
      - {label: "তারিখ (Publish Date)", name: "date", widget: "datetime"}
      - {label: "ইউটিউব ভিডিও লিংক (YouTube URL)", name: "video_url", widget: "string"}
      - {label: "ভিডিওর বিবরণ (Description)", name: "body", widget: "markdown", required: false}

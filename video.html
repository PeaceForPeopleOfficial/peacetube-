<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভিডিও প্লেয়ার - পিস টিউব</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Galada&family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0f4f8; }
        .brand-title { font-family: 'Galada', cursive; }
    </style>
</head>
<body>
    <nav class="bg-gradient-to-r from-emerald-600 to-teal-700 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <i class="fas fa-arrow-left text-xl"></i>
                <span class="brand-title text-2xl font-bold tracking-wide">ফিরে যান</span>
            </a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden p-6">
            <div class="aspect-w-16 aspect-h-9 mb-4">
                <iframe id="player" class="w-full h-[450px] rounded-xl shadow-inner" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            <h1 id="video-title" class="text-3xl font-bold text-slate-800 mb-2">ভিডিও লোড হচ্ছে...</h1>
            <div id="video-desc" class="text-slate-600 border-t border-slate-100 pt-4 mt-4"></div>
        </div>
    </main>
</body>
</html>
